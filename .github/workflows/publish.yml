name: Publish to PyPI

# Publishes on any tag starting with `v` (e.g. v0.1.0). The tag must match the
# version in pyproject.toml — the "Verify tag" step enforces this.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zaksway-kafka-mcp
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC) — no token needed
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Python
        run: uv python install 3.12

      - name: Verify tag matches project version
        run: |
          VERSION=$(uv run --no-project python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "git tag = $TAG | pyproject version = $VERSION"
          test "$TAG" = "$VERSION" || { echo "::error::Tag '$TAG' does not match pyproject version '$VERSION' — bump the version before tagging."; exit 1; }

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Publish to PyPI
        run: uv publish
